name: Release on Tag

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-24.04

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Required to validate tag commit ancestry against the default branch.
          fetch-depth: 0

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          # renovate: datasource=java-version packageName=java
          java-version: 21.0.10+7.0.LTS

      - uses: sbt/setup-sbt@508b753e53cb6095967669e0911487d2b9bc9f41 # v1.1.22

      - name: Validate tag version with build.sbt
        id: release_meta
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          TAG_NAME="${GITHUB_REF_NAME}"
          TAG_COMMIT_SHA="${GITHUB_SHA}"

          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match v0.0.0 format: $TAG_NAME"
            exit 1
          fi

          if [[ -z "$DEFAULT_BRANCH" ]]; then
            echo "Failed to detect default branch name"
            exit 1
          fi

          git fetch --no-tags origin "$DEFAULT_BRANCH":"refs/remotes/origin/$DEFAULT_BRANCH"
          if ! git merge-base --is-ancestor "$TAG_COMMIT_SHA" "origin/$DEFAULT_BRANCH"; then
            echo "Tag commit $TAG_COMMIT_SHA is not on default branch $DEFAULT_BRANCH"
            exit 1
          fi

          TAG_VERSION="${TAG_NAME#v}"

          if [[ -z "$TAG_VERSION" ]]; then
            echo "Failed to resolve version from tag: $TAG_NAME"
            exit 1
          fi

          if [[ "$TAG_VERSION" == *"SNAPSHOT"* ]]; then
            echo "SNAPSHOT tag is not allowed for release: $TAG_NAME"
            exit 1
          fi

          BUILD_VERSION=$(sbt --batch --error -Dsbt.log.noformat=true "print version" | awk 'NF{line=$0} END{gsub(/^[[:space:]]+|[[:space:]]+$/, "", line); print line}')
          if [[ -z "$BUILD_VERSION" ]]; then
            echo "Failed to resolve build.sbt version"
            exit 1
          fi

          if [[ "$TAG_VERSION" != "$BUILD_VERSION" ]]; then
            echo "Version mismatch: tag=$TAG_VERSION, build.sbt=$BUILD_VERSION"
            exit 1
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$BUILD_VERSION" >> "$GITHUB_OUTPUT"

      - name: Run compile and tests
        shell: bash
        run: sbt --verbose "+test"

      - name: Publish to GitHub Packages
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: sbt --verbose publish

      - name: Create GitHub Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release_meta.outputs.tag_name }}
        run: |
          if gh release view "$TAG_NAME" > /dev/null 2>&1; then
            echo "Release already exists for $TAG_NAME. Skipping create."
            exit 0
          fi

          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes

      - name: Delete same-version SNAPSHOT package if exists
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          RELEASE_VERSION: ${{ steps.release_meta.outputs.version }}
          PACKAGE_TYPE: maven
          SCOPE: users
        run: |
          SNAPSHOT_VERSION="${RELEASE_VERSION}-SNAPSHOT"
          NAME=$(sbt -Dsbt.log.noformat=true "print name" | tail -1)
          ORGANIZATION=$(sbt -Dsbt.log.noformat=true "print organization" | tail -1)
          SCALA_BINARY_VERSION=$(sbt -Dsbt.log.noformat=true "print scalaBinaryVersion" | tail -1)

          PACKAGE_NAME="$ORGANIZATION.$NAME"
          if [[ -n "$SCALA_BINARY_VERSION" ]]; then
            PACKAGE_NAME="${ORGANIZATION}.${NAME}_${SCALA_BINARY_VERSION}"
          fi

          echo "Looking for SNAPSHOT package version: $PACKAGE_NAME:$SNAPSHOT_VERSION"

          PACKAGE_ID=$(gh api -H "Accept: application/vnd.github+json" \
            /$SCOPE/$OWNER/packages?package_type=$PACKAGE_TYPE \
            --jq ".[] | select(.name==\"$PACKAGE_NAME\") | .id")

          if [[ -z "$PACKAGE_ID" ]]; then
            echo "Package not found in $SCOPE/$OWNER scope; skipping delete."
            exit 0
          fi

          VERSIONS_JSON=$(gh api -H "Accept: application/vnd.github+json" \
            /$SCOPE/$OWNER/packages/$PACKAGE_TYPE/$PACKAGE_NAME/versions)

          VERSION_COUNT=$(echo "$VERSIONS_JSON" | jq 'length')
          VERSION_ID=$(echo "$VERSIONS_JSON" | jq -r --arg VER "$SNAPSHOT_VERSION" '.[] | select(.name==$VER) | .id')

          if [[ -z "$VERSION_ID" ]]; then
            echo "No SNAPSHOT version found; no deletion needed."
            exit 0
          fi

          if [[ "$VERSION_COUNT" -le 1 ]]; then
            echo "Version count is $VERSION_COUNT (last version); deleting package $PACKAGE_NAME"
            gh api --method DELETE -H "Accept: application/vnd.github+json" \
              /$SCOPE/$OWNER/packages/$PACKAGE_TYPE/$PACKAGE_NAME
          else
            echo "Version count is $VERSION_COUNT; deleting version $SNAPSHOT_VERSION ($VERSION_ID)"
            gh api --method DELETE -H "Accept: application/vnd.github+json" \
              /$SCOPE/$OWNER/packages/$PACKAGE_TYPE/$PACKAGE_NAME/versions/$VERSION_ID
          fi
